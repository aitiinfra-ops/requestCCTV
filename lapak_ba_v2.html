<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Berita Acara Pekerjaan</title>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

/* FIX OVERFLOW GLOBAL */
*{
  box-sizing: border-box;
}

:root{
  --primary:#005BAC;
  --bg:#f4f7fb;
  --card:#ffffff;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
}

/* HEADER */
.header{
  background: var(--primary);
  color:#fff;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
}

.header img{
  height:40px;
}

.header h1{
  font-size:18px;
  margin:0;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

/* CARD */
.card{
  background: var(--card);
  border-radius:12px;
  padding:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* TITLE */
.card h2{
  margin-top:0;
  font-size:16px;
  border-left:4px solid var(--primary);
  padding-left:8px;
}

/* INPUT */
input, select, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* BUTTON */
button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-primary{
  background: var(--primary);
  color:white;
  width:100%;
}

.btn-add{
  background:#00aaff;
  color:white;
}

.btn-delete{
  background:#ff4d4f;
  color:white;
  margin-top:10px;
}

/* PERANGKAT */
.perangkat{
  border:1px solid #eee;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  background:#fafafa;
}

.judul-perangkat{
  margin:0 0 10px;
  color:var(--primary);
  font-size:14px;
  font-weight:bold;
}

/* MOBILE FIX */
@media(max-width:600px){

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .header img{
    height:30px;
  }

  .header h1{
    font-size:16px;
  }

  input, select, textarea{
    font-size:16px;
  }

  canvas{
    height:150px !important;
  }
}

/* LOADING */
.loading{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:16px;
  z-index:9999;
  display:none;
}

.spinner{
  border:5px solid #eee;
  border-top:5px solid #005BAC;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  display:none;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  width:90%;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

.modal-content h2{
  margin-top:0;
  color:#005BAC;
}

.modal-content button{
  margin-top:15px;
  background:#005BAC;
  color:#fff;
  width:100%;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.modal-content a {
  display: inline-block;
  word-break: break-word;  /* pecah kata panjang */
  color: var(--primary);
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <h1>Berita Acara Pekerjaan</h1>
</div>

<div class="container">

<!-- INFORMASI -->
<div class="card">
<h2>Informasi Pekerjaan</h2>

<div class="grid">
<div>
<label>Tanggal</label>
<input type="date">
</div>

<div>
<label>Nomor Tiket</label>
<input type="text">
</div>
</div>

<label>Nama Engineer</label>
<input type="text">

<label>NIK Engineer</label>
<input type="text">

<label>Nama Koordinator</label>
<input type="text">

<label>NIK Koordinator</label>
<input type="text">

<label>Koridor</label>
<select id="koridor" onchange="updateHalte()"></select>

<label>Halte</label>
<select id="halte"></select>

<label>Kegiatan</label>
<textarea rows="3"></textarea>
</div>

<!-- PERANGKAT -->
<div class="card">
<h2>Detail Perangkat</h2>

<div id="perangkatContainer"></div>

<button class="btn-add" onclick="tambahPerangkat()">+ Tambah Perangkat</button>
</div>

<!-- PETUGAS -->
<div class="card">
<h2>Petugas Halte</h2>

<label>Nama Petugas</label>
<input type="text">

<label>NIK Petugas</label>
<input type="text">
</div>

<!-- TTD -->
<div class="card">
<h2>Tanda Tangan</h2>

<label>TTD Engineer</label>
<canvas id="ttdEngineer" style="width:100%;height:200px;border:1px solid #ccc;border-radius:8px;"></canvas>
<button class="btn-delete" onclick="clearTTD('engineer')">Hapus TTD Engineer</button>

<br><br>

<label>TTD Petugas Halte</label>
<canvas id="ttdPetugas" style="width:100%;height:200px;border:1px solid #ccc;border-radius:8px;"></canvas>
<button class="btn-delete" onclick="clearTTD('petugas')">Hapus TTD Petugas</button>
</div>

<button class="btn-primary" onclick="submitForm()">Submit</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){


// DATA
const koridorData = {
  "1": { arahA: "Blok M", arahB: "Kota" },
  "2": { arahA: "Pulo Gadung", arahB: "Kwitang" },
  "3": { arahA: "Kalideres", arahB: "Pasar Baru" },
  "4": { arahA: "Pulo Gadung", arahB: "Galunggung" },
  "5": { arahA: "Ancol", arahB: "Kampung Melayu" },
  "6": { arahA: "Ragunan", arahB: "Galunggung" },
  "7": { arahA: "Kampung Rambutan", arahB: "Kampung Melayu" },
  "8": { arahA: "Lebak Bulus", arahB: "Pasar Baru" },
  "9": { arahA: "Pinang Ranti", arahB: "Pluit" },
  "10": { arahA: "Tanjung Priok", arahB: "PGC" },
  "11": { arahA: "Pulo Gebang", arahB: "Kampung Melayu" },
  "12": { arahA: "Tanjung Priok", arahB: "Kota" },
  "13": { arahA: "Tendean", arahB: "Ciledug" },
  "14": { arahA: "Pasar Senen", arahB: "Jakarta International Stadium" }
};

const halteData = {
"1":["Blok M","ASEAN","Kejaksaan Agung","Masjid Agung","Bundaran Senayan","Istora","Polda Metro Jaya","Bendungan Hilir","Karet","Dukuh Atas","Tosari","Bundaran HI ASTRA","Sabang","Kebon Sirih","Monumen Nasional","Harmoni","Sawah Besar","Mangga Besar","Taman Sari","Glodok","Kali Besar","Monumen Fatahillah","Kota"],

"2":["Pulo Gadung","Bermis","Pulo Mas","Perintis Kemerdekaan","Pedongkelan","Cempaka Mas","Sumur Batu","Cempaka Baru","Pasar Cempaka Putih","Rawa Selatan","Galur","Pasar Senen","Senen Raya","RSPAD","Pejambon","Gambir","Istiqlal","Juanda","Pecenongan","Monumen Nasional","Balai Kota","Gambir 2","Kwitang"],

"3":["Kalideres","Pesakih","Sumur Bor","Rawa Buaya","Jembatan Baru","Pulo Nangka","Jembatan Gantung","Taman Kota","Damai","Jelambar","Grogol","Roxy","Petojo","Monumen Nasional","Pecenongan","Juanda","Pasar Baru"],

"4":["Pulo Gadung","Pasar Pulo Gadung","Pemuda Merdeka","Layur","Pemuda Rawamangun","Velodrome","Sunan Giri","Rawamangun","Simpang Pramuka","Pramuka Sari","Utan Kayu","Pasar Genjing","Fly Over Pramuka","Manggarai","Pasar Rumput","Halimun","Galunggung"],

"5":["Ancol","Pademangan","Gunung Sahari","Jembatan Merah","Pasar Baru Timur","Lapangan Banteng","Senen Sentral","Pal Putih","Kramat Sentiong","Salemba","Paseban","Matraman","Tegalan","Kesatrian","Matraman Baru","Bail Mester","Jatinegara","Kampung Melayu"],

"6":["Ragunan","Simpang Ragunan","Jati Barat","Jati Padang","Pejaten","Buncit Indah","Warung Jati","Warung Buncit","Duren Tiga","Mampang Prapatan","Underpass Kuningan","Patra Kuningan","Kuningan","Rasuna Said","Karet Kuningan","Kuningan Madya","Setiabudi","Flyover Kuningan","Galunggung"],

"7":["Kampung Rambutan","Tanah Merdeka","Fly Over Raya Bogor","Trikora","Pasar Induk","Kramat Jati Raya","Cililitan","Cawang Cililitan","Cawang Central","Cawang","Simpang Cawang","Gelanggang Remaja","Bidara Cina","Kampung Melayu"],

"8":["Lebak Bulus","Pondok Pinang","Underpass Lebak Bulus","Pondok Indah","Tanah Kusir","Bungu","Kebayoran Lama","Simprug","Permata Hijau","Arteri","Pos Pengumben","Kelapa Dua Sasak","Kebon Jeruk","Duri Kepa","Kedoya Panjang","Kedoya","Damai","Jelambar","Grogol Reformasi","Tanjung Duren","Tomang Raya","Tarakan","Petojo","Pecenongan","Juanda","Pasar Baru"],

"9":["Pinang Ranti","Makasar","Cawang Sentral","Cawang","Ciliwung","Cikoko","Tebet ECO Park","Pancoran Tugu","Pancoran","Tegal Parang","Simpang Kuningan","Denpasar","Widya Chandra","Semanggi","Senayan","Petamburan","Kemanggisan","Kota Bambu","Tanjung Duren","Grogol Reformasi","Kali Grogol","Jembatan Besi","Jembatan Dua","Jembatan Tiga","Penjaringan","Pluit"],

"10":["Tanjung Priok","Mambo","Koja","Walikota Jakarta Utara","Plumpang","Sunter Kelapa Gading","Kodamar","Simpang Cempaka","Cempaka Putih","Pulomas Bypass","Kayu Putih Rawasari","Pemuda Pramuka","Utan Kayu Rawamangun","Pisangan","Flyover Jatinegara","Pedati Perumpung","Kebon Nanas","Halim","Simpang Cawang","Cawang Central","Cawang Cililitan","PGC"],

"11":["Pulo Gebang","Walikota Jakarta Timur","Penggilingan","Flyover Pondok Kopi","Simpang Buaran","Buaran","Kampung Sumur","Klender","Stasiun Klender","Cipinang","Flyover Cipinang","Pasar Enjo","Flyover Jatinegara","Stasiun Jatinegara","Jatinegara","Kampung Melayu"],

"12":["Tanjung Priok","Mambo","Koja","Walikota Jakarta Utara","Plumpang","Sunter Kelapa Gading","Sunter Boulevard Barat","Sunter Karya","Sunter Utara","Danau Agung","Landasan Pacu","Jembatan Merah","Gunung Sahari","ITC Mangga Dua","Pangeran Jayakarta","Kali Besar","Bandengan","Penjaringan","Pluit","Pluit Selatan","Pakin","Gedong Panjang","Museum Fatahillah","Kota"],

"13":["Tendean","Rawa Barat","Tirtayasa","CSW","Mayestik","Velbak","Kebayoran Lama","Seskoal","Cipulir","Swadarma","JORR","Petukangan Utara","Puri Beta 1","Puri Beta 2","Ciledug"],

"14":["Pasar Senen","Senen Raya","Tanah Tinggi","Kemayoran","Landasan Pacu","Danau Agung","Danau Sunter","Jembatan Item","Jakarta International Stadium"]
};

// LOAD KORIDOR
const koridor = document.getElementById("koridor");
koridor.innerHTML = '<option value="">Pilih Koridor</option>';

for(let k in koridorData){
  koridor.innerHTML += `
    <option value="${k}">
      Koridor ${k} (${koridorData[k].arahA} - ${koridorData[k].arahB})
    </option>
  `;
}

// HALTE
window.updateHalte = function(){
  const val = koridor.value;
  const halte = document.getElementById("halte");

  halte.innerHTML = '<option>Pilih Halte</option>';

  if(halteData[val]){
    halteData[val].forEach(h=>{
      halte.innerHTML += `<option>${h}</option>`;
    });
  }
}

// PERANGKAT
window.tambahPerangkat = function(){
  const container = document.getElementById("perangkatContainer");

  const div = document.createElement("div");
  div.className = "perangkat";

  div.innerHTML = `
    <h3 class="judul-perangkat"></h3>

    <input placeholder="Perangkat">
    <input placeholder="Merk & Model">
    <input placeholder="Nomor SN">
    <input placeholder="Kondisi">

    <button class="btn-delete" onclick="hapusPerangkat(this)">Hapus</button>
  `;

  container.appendChild(div);
  updateNomor();
}

window.hapusPerangkat = function(btn){
  btn.parentElement.remove();
  updateNomor();
}

function updateNomor(){
  document.querySelectorAll(".perangkat").forEach((el,i)=>{
    el.querySelector(".judul-perangkat").innerText = "Perangkat #" + (i+1);
  });
}

// INIT PERANGKAT
tambahPerangkat();

// TTD
let ttdEngineerPad, ttdPetugasPad;

setTimeout(() => {
  initTTD();
}, 300);

function initTTD(){
  const canvasEngineer = document.getElementById("ttdEngineer");
  const canvasPetugas = document.getElementById("ttdPetugas");

  fixCanvas(canvasEngineer);
  fixCanvas(canvasPetugas);

  ttdEngineerPad = new SignaturePad(canvasEngineer);
  ttdPetugasPad = new SignaturePad(canvasPetugas);
}

function fixCanvas(canvas){
  const ratio = Math.max(window.devicePixelRatio || 1, 1);

  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  canvas.getContext("2d").scale(ratio, ratio);
}

window.clearTTD = function(type){
  if(type === 'engineer'){
    ttdEngineerPad.clear();
  } else {
    ttdPetugasPad.clear();
  }
}

window.getTTD = function(){
  return {
    engineer: ttdEngineerPad.isEmpty() ? "" : ttdEngineerPad.toDataURL(),
    petugas: ttdPetugasPad.isEmpty() ? "" : ttdPetugasPad.toDataURL()
  };
}

});

// ====================== SUBMIT FORM ======================
async function submitForm(){

  document.getElementById("loading").style.display = "flex";

  const ttd = getTTD();

  const perangkatList = [];
  document.querySelectorAll(".perangkat").forEach(p => {
    const inputs = p.querySelectorAll("input");

    perangkatList.push({
      nama: inputs[0].value,
      merk: inputs[1].value,
      sn: inputs[2].value,
      kondisi: inputs[3].value
    });
  });

  const data = {
    tanggal: document.querySelector('input[type="date"]').value,
    tiket: document.querySelectorAll('input')[1].value,
    engineer: document.querySelectorAll('input')[2].value,
    nik_engineer: document.querySelectorAll('input')[3].value,
    koordinator: document.querySelectorAll('input')[4].value,
    nik_koordinator: document.querySelectorAll('input')[5].value,
    koridor: document.getElementById("koridor").value,
    halte: document.getElementById("halte").value,
    kegiatan: document.querySelector("textarea").value,
    perangkat: perangkatList,
    petugas: document.querySelectorAll('input')[6].value,
    nik_petugas: document.querySelectorAll('input')[7].value,
    ttd_engineer: ttd.engineer,
    ttd_petugas: ttd.petugas
  };

  const url = "https://script.google.com/macros/s/AKfycbwOq97CF-uVNEGUnT4yUA0smcjvhxg0F_zvq3EZmlfaIdosquHdVuUHx-kdSRAgOJa7dg/exec";

  try{
    const res = await fetch(url, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("loading").style.display = "none";

    if(result.status === "success"){

      const link = result.link;

      // 🔥 TAMPILKAN MODAL, bukan alert
      showSuccess(data, link);

    } else {
      showError(result.message);
    }

  }catch(err){
    document.getElementById("loading").style.display = "none";
    showError("Error koneksi!");
  }
}

// ====================== MODAL FUNCTIONS ======================
function showSuccess(data, link){
  const preview = `
    <p><b>Tanggal:</b> ${data.tanggal}</p>
    <p><b>Tiket:</b> ${data.tiket}</p>
    <p><b>Engineer:</b> ${data.engineer}</p>
    <p><b>Koridor:</b> ${data.koridor}</p>
    <p><b>Halte:</b> ${data.halte}</p>
    <p><b>Jumlah Perangkat:</b> ${data.perangkat.length}</p>
    <p><b>Link Berita Acara:</b> <a href="${link}" target="_blank">${link}</a></p>
    <p><button onclick="openWhatsApp('${link}')">Kirim ke WhatsApp Koordinator</button></p>
  `;

  document.getElementById("previewData").innerHTML = preview;
  const modal = document.getElementById("successModal");
  modal.querySelector("h2").innerText = "✅ Berhasil!";
  modal.style.display = "flex";
}

function showError(message){
  const modal = document.getElementById("successModal");
  modal.querySelector("h2").innerText = "❌ Gagal!";
  modal.querySelector("#previewData").innerHTML = `<p>${message}</p>`;
  modal.style.display = "flex";
}

function closeModal(){
  document.getElementById("successModal").style.display = "none";
  location.reload();
}

function openWhatsApp(link){
  const text = encodeURIComponent("Halo, mohon approval Berita Acara berikut:\n\n" + link);
  window.open("https://wa.me/?text=" + text, "_blank");
}

</script>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Menyimpan data...</p>
</div>

<!-- MODAL SUCCESS -->
<div id="successModal" class="modal">
  <div class="modal-content">
    <h2>✅ Berhasil!</h2>
    <div id="previewData"></div>
    <button onclick="closeModal()">Tutup</button>
  </div>
</div>

</body>
</html>
